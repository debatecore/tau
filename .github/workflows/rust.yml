name: Cargo Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      SECRET: secret
      PORT: ${{ vars.PORT || '2023' }}
      FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || 'http://localhost:3000' }}
      DATABASE_URL: postgres://tau:postgres@127.0.0.1:5432/tau

    services:
      postgres:
        image: postgres:17.2
        env:
          POSTGRES_USER: tau
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tau
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h localhost -U tau -d tau"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install sqlx-cli
        run: |
          cargo install sqlx-cli \
            --version 0.7.4 \
            --locked \
            --no-default-features \
            --features rustls,postgres

      - name: Run migrations
        run: sqlx migrate run
      - name: Build
        run: cargo build --lib --verbose
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy -- -D warnings
      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked || true
      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          echo "### Coverage report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov --workspace --tests --verbose --html --output-dir target/llvm-cov/html 2>&1 | tee >(sed 's/^/    /' >> "$GITHUB_STEP_SUMMARY")
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html
      - name: Build Docker image
        run: docker build -t tau:test .
      - name: Build Docker Compose
        run: docker compose build server-prod

  deploy-pages:
    name: Deploy coverage to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Download coverage report artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: target/llvm-cov/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

      - name: Show GitHub Pages URL
        run: |
          echo "GitHub Pages site should be available at: https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"

  version-check:
    name: Check package version
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Check Cargo.toml and pyproject.toml versions
        run: python scripts/check_version.py "origin/${{ github.base_ref }}"
