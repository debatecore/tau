name: Cargo Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      SECRET: secret
      PORT: ${{ vars.PORT || '2023' }}
      FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || 'http://localhost:3000' }}
      DATABASE_URL: postgres://tau:postgres@127.0.0.1:5432/tau

    services:
      postgres:
        image: postgres:17.2
        env:
          POSTGRES_USER: tau
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tau
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h localhost -U tau -d tau"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install sqlx-cli
        run: |
          cargo install sqlx-cli \
            --version 0.7.4 \
            --locked \
            --no-default-features \
            --features rustls,postgres

      - name: Run migrations
        run: sqlx migrate run
      - name: Build
        run: cargo build --lib --verbose
      - name: Run unit tests
        run: cargo test --lib --verbose
      - name: Run integration tests
        run: cargo test --test integration_tests --verbose
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy -- -D warnings
      - name: Build Docker image
        run: docker build -t tau:test .
      - name: Build Docker Compose
        run: docker compose build server-prod

  version-check:
    name: Check package version
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Check Cargo.toml and pyproject.toml versions
        run: python scripts/check_version.py "origin/${{ github.base_ref }}"
